# Streamlit Secrets Configuration Template
# Lưu file này tại: ~/.streamlit/secrets.toml

# Google Cloud Service Account credentials (từ file JSON bạn tải xuống)
[gcp_service_account]
type = "service_account"
project_id = "your-project-id"
private_key_id = "your-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAAOCBK...\n-----END PRIVATE KEY-----\n"
client_email = "streamlit-bot@your-project-id.iam.gserviceaccount.com"
client_id = "123456789"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/streamlit-bot%40your-project-id.iam.gserviceaccount.com"

# Google Sheet ID (lấy từ URL của sheet)
# URL: https://docs.google.com/spreadsheets/d/SHEET_ID/edit
sheet_id = "1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p"
